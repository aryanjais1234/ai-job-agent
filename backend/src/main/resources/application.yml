spring:
  application:
    name: ai-job-agent

  # ── Database ──────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aijobagent}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: AiJobAgentHikari

  # ── JPA ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 25

  # ── Mail ──────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── RabbitMQ ──────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0

  # ── Redis ─────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  # ── File Upload ───────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# ── Server ────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,text/plain

# ── Application Custom Config ─────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 86400000    # 24 hours
    refresh-token-expiry-ms: 604800000  # 7 days

  ai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    analysis-model: ${AI_ANALYSIS_MODEL:gpt-4o-mini}
    tailor-model: ${AI_TAILOR_MODEL:gpt-4o}
    max-tokens: 4096
    timeout-seconds: 60
    retry-max-attempts: 3

  scraper:
    base-url: ${SCRAPER_SERVICE_URL:http://scraper-service:8000}
    timeout-seconds: 300

  storage:
    resume-upload-dir: ${RESUME_UPLOAD_DIR:/app/storage/resumes}
    pdf-output-dir: ${PDF_OUTPUT_DIR:/app/storage/pdfs}

  matching:
    minimum-score-threshold: 70.0
    auto-tailor-threshold: 75.0

  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@aijobagent.dev}
    from-name: "AI Job Agent"
    daily-digest-cron: ${DAILY_DIGEST_CRON:0 0 7 * * *}
    scrape-cron: ${SCRAPE_CRON:0 0 6 * * *}

# ── Logging ───────────────────────────────────────────────────────────
logging:
  level:
    com.aryanjais.aijobagent: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── Springdoc OpenAPI ─────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
