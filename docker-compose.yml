version: '3.9'

networks:
  aijobagent-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  resume_storage:
  pdf_storage:

services:

  # ── MySQL ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: aijobagent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-aijobagent}
      MYSQL_USER: ${DB_USERNAME:-aijobagent}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - aijobagent-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aijobagent-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aijobagent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: aijobagent-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - aijobagent-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── API Gateway (Spring Boot) ──────────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: aijobagent-api-gateway
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aijobagent}
      DB_USERNAME: ${DB_USERNAME:-aijobagent}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET}
      SCRAPER_SERVICE_URL: http://scraper-service:8000
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - resume_storage:/app/storage/resumes
      - pdf_storage:/app/storage/pdfs
    networks:
      - aijobagent-net

  # ── Job Processor (Spring Boot) ────────────────────────────────────
  job-processor:
    build:
      context: ./backend
      dockerfile: job-processor/Dockerfile
    container_name: aijobagent-job-processor
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aijobagent}
      DB_USERNAME: ${DB_USERNAME:-aijobagent}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SERVER_PORT: 8081
    networks:
      - aijobagent-net

  # ── Document Service (Spring Boot) ─────────────────────────────────
  document-service:
    build:
      context: ./backend
      dockerfile: document-service/Dockerfile
    container_name: aijobagent-document-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aijobagent}
      DB_USERNAME: ${DB_USERNAME:-aijobagent}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SERVER_PORT: 8082
    volumes:
      - resume_storage:/app/storage/resumes
      - pdf_storage:/app/storage/pdfs
    networks:
      - aijobagent-net

  # ── Notification Service (Spring Boot) ──────────────────────────────
  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: aijobagent-notification-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aijobagent}
      DB_USERNAME: ${DB_USERNAME:-aijobagent}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-noreply@aijobagent.dev}
      SERVER_PORT: 8083
    networks:
      - aijobagent-net

  # ── FastAPI Scraper Service ──────────────────────────────────────────
  scraper-service:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: aijobagent-scraper
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8000:8000"
    networks:
      - aijobagent-net

  # ── React Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    container_name: aijobagent-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - aijobagent-net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aijobagent-nginx
    restart: unless-stopped
    depends_on:
      - api-gateway
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - aijobagent-net
